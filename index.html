<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>哔乐助播 · 智能直播助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f8 100%);
            color: #1a2634;
            scroll-behavior: smooth;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #e9ecef;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #9aa9bb;
            border-radius: 10px;
        }

        /* 布局容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 导航栏 */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 40;
            padding: 16px 0;
        }
        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo-icon {
            font-size: 2rem;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            font-weight: 500;
        }
        .nav-links a {
            text-decoration: none;
            color: #2c3e50;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #4f46e5;
        }

        /* 按钮样式 */
        .btn-primary {
            background: linear-gradient(100deg, #4f46e5, #7c3aed);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(79,70,229,0.25);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(79,70,229,0.35);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #cbd5e1;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-outline:hover {
            border-color: #4f46e5;
            color: #4f46e5;
        }

        /* Hero 区域 */
        .hero {
            padding: 60px 0 40px;
            text-align: center;
        }
        .hero h1 {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #1e293b, #4f46e5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.01em;
        }
        .hero .sub {
            font-size: 1.25rem;
            color: #475569;
            max-width: 700px;
            margin: 20px auto 0;
            line-height: 1.5;
        }
        .hero-buttons {
            margin-top: 32px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* 卡片通用 */
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            padding: 28px 32px;
            margin-bottom: 48px;
            transition: all 0.2s;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 28px;
            border-left: 5px solid #4f46e5;
            padding-left: 20px;
        }

        /* 功能卡片网格 */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
            margin-top: 16px;
        }
        .feature-item {
            background: #fafcff;
            border-radius: 24px;
            padding: 24px 20px;
            transition: all 0.25s;
            border: 1px solid #edf2f7;
        }
        .feature-icon {
            font-size: 2.4rem;
            margin-bottom: 16px;
        }
        .feature-item h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
        }
        .feature-item p {
            color: #4b5563;
            line-height: 1.45;
        }

        /* 使用说明 step */
        .steps {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: space-between;
        }
        .step {
            flex: 1;
            background: #f8fafc;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
        }
        .step-num {
            width: 44px;
            height: 44px;
            background: #eef2ff;
            color: #4f46e5;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.4rem;
            margin-bottom: 16px;
        }
        .faq-item {
            margin-top: 28px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        .faq-question {
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .faq-answer {
            margin-top: 12px;
            color: #475569;
            display: none;
        }
        .faq-answer.show {
            display: block;
        }

        /* 下载列表区域 */
        .download-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .download-item {
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid #eef2ff;
            padding: 20px 28px;
            transition: all 0.2s;
        }
        .download-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .version-tag {
            background: #eef2ff;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #4f46e5;
        }
        .badge-latest {
            background: #10b981;
            color: white;
            margin-left: 12px;
        }
        .download-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            font-size: 0.9rem;
            color: #4b5563;
            margin: 12px 0;
        }
        .md5-block {
            font-family: monospace;
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-download {
            background: #1e293b;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-download:hover {
            background: #4f46e5;
            transform: scale(0.98);
        }
        .history-toggle {
            margin-top: 20px;
            text-align: center;
        }

        /* 侧边抽屉 (方案B 弹出下载详情) */
        .drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 480px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 30px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            padding: 28px 24px;
            overflow-y: auto;
        }
        .drawer.open {
            right: 0;
        }
        .drawer-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            z-index: 999;
            display: none;
        }
        .drawer-backdrop.show {
            display: block;
        }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 28px;
        }
        .close-drawer {
            font-size: 28px;
            cursor: pointer;
        }
        .drawer-info {
            margin: 20px 0;
        }
        .drawer-md5 {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 20px;
            font-family: monospace;
            word-break: break-all;
        }
        .verify-local {
            margin-top: 28px;
            border-top: 1px solid #e2e8f0;
            padding-top: 24px;
        }

        footer {
            text-align: center;
            padding: 40px 0 30px;
            color: #5b6e8c;
            border-top: 1px solid #e2e8f0;
            margin-top: 20px;
        }

        @media (max-width: 720px) {
            .container {
                padding: 0 16px;
            }
            .hero h1 {
                font-size: 2.2rem;
            }
            .section-title {
                font-size: 1.5rem;
            }
            .download-header {
                flex-direction: column;
                align-items: start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container nav-inner">
        <div class="logo">
            <span class="logo-icon">🎙️</span>
            <span>哔乐助播</span>
        </div>
        <div class="nav-links">
            <a href="#hero">简介</a>
            <a href="#features">功能</a>
            <a href="#howto">使用说明</a>
            <a href="#downloads">下载</a>
        </div>
    </div>
</nav>

<main class="container">
    <!-- Hero 动态注入 -->
    <div id="heroSection" class="hero"></div>

    <!-- 核心功能卡片 -->
    <div id="featuresSection" class="card"></div>

    <!-- 使用说明区域 -->
    <div id="howtoSection" class="card"></div>

    <!-- 下载列表区域 -->
    <div id="downloadsSection" class="card"></div>

    <footer id="footer"></footer>
</main>

<!-- 侧边抽屉 (详情面板) -->
<div id="downloadDrawer" class="drawer">
    <div class="drawer-header">
        <span>📦 下载详情</span>
        <span class="close-drawer">&times;</span>
    </div>
    <div id="drawerContent"></div>
</div>
<div id="drawerBackdrop" class="drawer-backdrop"></div>

<script>
    // --------------------------------------------------------------
    // 配置数据源: 直接使用内嵌 data.json 风格 (但为了符合Gitee方便编辑, 定义 window.APP_DATA)
    // 实际可以改为 fetch('data.json') , 但由于Gitee raw 可能跨域或缓存，推荐将数据定义为全局对象方便修改。
    // 为了演示“便于编辑”，将所有文本/下载项放在 CONFIG 对象中，修改此对象即改变整个页面。
    // 同时支持从外部 data.json 加载，使用fetch并fallback。
    // --------------------------------------------------------------
    const DEFAULT_CONFIG = {
        hero: {
            title: "哔乐助播",
            highlight: "让直播助播效率翻倍",
            description: "专业级直播辅助工具 — 智能场控 · 实时弹幕管理 · 商品提词器 · 多平台数据看板。为团队协作而生，开播更从容。",
            primaryBtn: "立即下载新版",
            primaryLink: "#downloads",
            secondaryBtn: "了解功能",
            secondaryLink: "#features"
        },
        features: {
            title: "✨ 核心能力",
            list: [
                { icon: "🎮", title: "智能场控", desc: "一键上下商品，自动回复，定时任务，解放双手专注内容。" },
                { icon: "💬", title: "弹幕互动增强", desc: "关键词高亮，弹幕礼物统计，自动感谢，提升直播间氛围。" },
                { icon: "📊", title: "实时数据看板", desc: "在线人数、成交趋势、粉丝变化，多维度复盘直播。" },
                { icon: "🔧", title: "提词器与脚本", desc: "悬浮提词，多组脚本快速切换，告别忘词尴尬。" }
            ]
        },
        usage: {
            title: "📖 使用说明",
            steps: [
                { num: 1, title: "下载安装包", desc: "从下方列表选择对应版本，点击「下载」获取安装程序。" },
                { num: 2, title: "运行安装", desc: "双击 .exe 文件，按照指引完成安装。建议关闭杀毒软件避免误报。" },
                { num: 3, title: "登录/激活", desc: "使用哔乐账号登录（注册免费），团队协作邀请成员。" },
                { num: 4, title: "开始直播", desc: "连接直播平台，开启助手功能，享受高效直播体验。" }
            ],
            faq: [
                { q: "❓ 杀毒软件报毒怎么办？", a: "本软件通过数字签名认证，如遇误报请添加信任区或临时关闭防护，安心使用。" },
                { q: "❓ 如何更新到最新版？", a: "软件内置自动更新提醒，或到官网下载页获取最新安装包覆盖安装。" },
                { q: "❓ MD5 校验是什么？", a: "用于验证文件完整性，下载后使用页面工具比对，防止文件损坏或被篡改。" }
            ]
        },
        downloads: {
            latestFirst: true,
            packages: [
                {
                    version: "2.1.0",
                    fileName: "BileLive_2.1.0_win_x64.exe",
                    fileSize: "98.5 MB",
                    md5: "a1b2c3d4",
                    releaseDate: "2026-04-20",
                    changelog: "新增数据大屏模式，修复弹窗卡顿，优化提词器性能。",
                    downloadUrl: "https://example.com/bile/BileLive_2.1.0_win_x64.exe",
                    isLatest: true
                },
                {
                    version: "2.0.5",
                    fileName: "BileLive_2.0.5_win_x64.exe",
                    fileSize: "94.2 MB",
                    md5: "e5f6g7h8",
                    releaseDate: "2026-03-10",
                    changelog: "增强多平台兼容，修复弹幕过滤bug。",
                    downloadUrl: "https://example.com/bile/BileLive_2.0.5_win_x64.exe",
                    isLatest: false
                },
                {
                    version: "1.9.0",
                    fileName: "BileLive_1.9.0_win_x64.exe",
                    fileSize: "88.1 MB",
                    md5: "9i0j1k2l",
                    releaseDate: "2026-01-15",
                    changelog: "首个稳定版本，基础场控功能上线。",
                    downloadUrl: "https://example.com/bile/BileLive_1.9.0_win_x64.exe",
                    isLatest: false
                }
            ]
        },
        footer: {
            copyright: "© 2026 哔乐传媒科技 | 专注直播生态",
            icp: "沪ICP备 12345678号"
        }
    };

    let appData = { ...DEFAULT_CONFIG };

    // 加载 data.json (若gitee托管，可以使用相对路径 './data.json'，同时兼容失败时使用内置)
    async function loadRemoteConfig() {
        try {
            // 注意: 若部署在Gitee Pages 同目录下存在 data.json 则优先使用，便于独立编辑
            const response = await fetch('data.json?_t=' + Date.now());
            if (response.ok) {
                const remote = await response.json();
                // 深度合并简单实现，保留完整结构
                appData = { ...DEFAULT_CONFIG, ...remote, 
                    hero: { ...DEFAULT_CONFIG.hero, ...remote.hero },
                    features: { ...DEFAULT_CONFIG.features, ...remote.features, list: remote.features?.list || DEFAULT_CONFIG.features.list },
                    usage: { ...DEFAULT_CONFIG.usage, ...remote.usage, steps: remote.usage?.steps || DEFAULT_CONFIG.usage.steps, faq: remote.usage?.faq || DEFAULT_CONFIG.usage.faq },
                    downloads: { ...DEFAULT_CONFIG.downloads, ...remote.downloads, packages: remote.downloads?.packages || DEFAULT_CONFIG.downloads.packages },
                    footer: { ...DEFAULT_CONFIG.footer, ...remote.footer }
                };
            } else {
                console.log("未找到外部data.json，使用内置默认配置，方便编辑");
            }
        } catch (e) {
            console.warn("加载外部配置失败，使用默认配置。", e);
        }
        renderAll();
    }

    // 渲染全部页面
    function renderAll() {
        renderHero();
        renderFeatures();
        renderUsage();
        renderDownloads();
        renderFooter();
        attachFaqEvents();
        attachDownloadEvents();
    }

    function renderHero() {
        const heroDiv = document.getElementById('heroSection');
        if (!heroDiv) return;
        heroDiv.innerHTML = `
            <h1>${escapeHtml(appData.hero.title)} <span style="background:linear-gradient(145deg,#4f46e5,#7c3aed); background-clip:text; -webkit-background-clip:text; color:transparent;">${escapeHtml(appData.hero.highlight)}</span></h1>
            <div class="sub">${escapeHtml(appData.hero.description)}</div>
            <div class="hero-buttons">
                <a href="${appData.hero.primaryLink}" class="btn-primary" id="scrollToDownloadBtn">⬇️ ${escapeHtml(appData.hero.primaryBtn)}</a>
                <a href="${appData.hero.secondaryLink}" class="btn-outline">✨ ${escapeHtml(appData.hero.secondaryBtn)}</a>
            </div>
        `;
        const scrollBtn = document.getElementById('scrollToDownloadBtn');
        if(scrollBtn) scrollBtn.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('downloadsSection')?.scrollIntoView({ behavior: 'smooth' });
        });
    }

    function renderFeatures() {
        const container = document.getElementById('featuresSection');
        if (!container) return;
        const list = appData.features.list;
        let itemsHtml = '';
        list.forEach(f => {
            itemsHtml += `<div class="feature-item"><div class="feature-icon">${f.icon}</div><h3>${escapeHtml(f.title)}</h3><p>${escapeHtml(f.desc)}</p></div>`;
        });
        container.innerHTML = `<div class="section-title">${escapeHtml(appData.features.title)}</div><div class="features-grid">${itemsHtml}</div>`;
    }

    function renderUsage() {
        const container = document.getElementById('howtoSection');
        if (!container) return;
        const steps = appData.usage.steps;
        let stepsHtml = '<div class="steps">';
        steps.forEach(s => {
            stepsHtml += `<div class="step"><div class="step-num">${s.num}</div><h3>${escapeHtml(s.title)}</h3><p>${escapeHtml(s.desc)}</p></div>`;
        });
        stepsHtml += '</div><div class="faq-area"><div class="section-title" style="margin-top:20px">❓ 常见问题</div>';
        const faqs = appData.usage.faq;
        faqs.forEach((item, idx) => {
            stepsHtml += `<div class="faq-item" data-faqidx="${idx}"><div class="faq-question">${escapeHtml(item.q)} <span>▼</span></div><div class="faq-answer">${escapeHtml(item.a)}</div></div>`;
        });
        stepsHtml += '</div>';
        container.innerHTML = `<div class="section-title">${escapeHtml(appData.usage.title)}</div>${stepsHtml}`;
    }

    function renderDownloads() {
        const container = document.getElementById('downloadsSection');
        if (!container) return;
        let packages = [...(appData.downloads.packages || [])];
        if (appData.downloads.latestFirst) {
            packages.sort((a,b) => {
                if(a.isLatest && !b.isLatest) return -1;
                if(!a.isLatest && b.isLatest) return 1;
                return b.version.localeCompare(a.version);
            });
        }
        let downloadsHtml = `<div class="section-title">📥 下载安装包</div><div class="download-grid">`;
        packages.forEach((pkg, idx) => {
            const latestBadge = pkg.isLatest ? '<span class="version-tag badge-latest" style="background:#10b981;">最新推荐</span>' : '';
            downloadsHtml += `
                <div class="download-item" data-pkg-index="${idx}">
                    <div class="download-header">
                        <div><span class="version-tag">v${escapeHtml(pkg.version)}</span> ${latestBadge}</div>
                        <div><span class="file-size">📁 ${escapeHtml(pkg.fileSize)}</span></div>
                    </div>
                    <div class="download-meta">
                        <span>📅 ${escapeHtml(pkg.releaseDate)}</span>
                        <span class="md5-block">🔐 MD5: ${escapeHtml(pkg.md5)} <span class="copy-md5" data-md5="${pkg.md5}" style="cursor:pointer;font-size:12px;">📋</span></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap:wrap; gap:12px;">
                        <div>📄 ${escapeHtml(pkg.fileName)}</div>
                        <button class="btn-download" data-download='${JSON.stringify(pkg)}'>⬇️ 下载</button>
                    </div>
                    <div style="font-size:0.8rem; margin-top:12px; color:#475569;">✨ 更新: ${escapeHtml(pkg.changelog)}</div>
                </div>
            `;
        });
        downloadsHtml += `</div><div class="history-toggle"><small>✅ 下载后建议使用下方“校验工具”比对MD5值，确保文件安全。</small></div>`;
        container.innerHTML = downloadsHtml;

        // 绑定复制MD5事件
        document.querySelectorAll('.copy-md5').forEach(el => {
            el.addEventListener('click', (e) => {
                const md5 = el.getAttribute('data-md5');
                navigator.clipboard.writeText(md5);
                el.innerText = '✓';
                setTimeout(() => el.innerText = '📋', 1000);
                e.stopPropagation();
            });
        });
    }

    function renderFooter() {
        const footerEl = document.getElementById('footer');
        if(footerEl) footerEl.innerHTML = `<p>${escapeHtml(appData.footer.copyright)} &nbsp;|&nbsp; ${escapeHtml(appData.footer.icp)}</p><p style="margin-top:8px;font-size:0.75rem;">本站所有安装包均提供MD5校验，确保下载安全。</p>`;
    }

    // 抽屉逻辑 (方案B)
    let currentPkg = null;
    function openDrawer(pkg) {
        currentPkg = pkg;
        const drawer = document.getElementById('downloadDrawer');
        const backdrop = document.getElementById('drawerBackdrop');
        const drawerContent = document.getElementById('drawerContent');
        drawerContent.innerHTML = `
            <div class="drawer-info">
                <h3>${escapeHtml(pkg.fileName)}</h3>
                <p><strong>版本:</strong> v${escapeHtml(pkg.version)} &nbsp; ${pkg.isLatest ? '✅ 最新稳定版' : ''}</p>
                <p><strong>文件大小:</strong> ${escapeHtml(pkg.fileSize)}</p>
                <p><strong>发布日期:</strong> ${escapeHtml(pkg.releaseDate)}</p>
                <p><strong>更新日志:</strong> ${escapeHtml(pkg.changelog)}</p>
                <div class="drawer-md5"><strong>MD5 (前8位):</strong> ${escapeHtml(pkg.md5)} <span class="copy-drawer-md5" style="cursor:pointer;margin-left:8px;">📋 复制</span></div>
                <a href="${pkg.downloadUrl}" download class="btn-primary" style="display:inline-block; margin-top:20px; text-decoration:none;">🔽 立即下载 ${escapeHtml(pkg.version)}</a>
            </div>
            <div class="verify-local">
                <strong>🔒 本地文件校验</strong><br>
                <input type="file" id="drawerFileInput" accept=".exe" style="margin:12px 0; width:100%;"/>
                <button id="drawerVerifyBtn" class="btn-outline">校验MD5</button>
                <div id="drawerVerifyResult" style="margin-top:12px; font-size:0.85rem;"></div>
                <p style="margin-top:16px; font-size:0.75rem;">* 点击校验后将计算文件MD5前8位，与页面比对。</p>
            </div>
        `;
        drawer.classList.add('open');
        backdrop.classList.add('show');

        // 绑定抽屉内复制MD5
        const copyDrawerMd5 = drawerContent.querySelector('.copy-drawer-md5');
        if(copyDrawerMd5) copyDrawerMd5.addEventListener('click', () => {
            navigator.clipboard.writeText(pkg.md5);
            copyDrawerMd5.innerText = '✓已复制';
            setTimeout(() => copyDrawerMd5.innerText = '📋 复制', 1200);
        });
        // 抽屉内校验逻辑
        const verifyBtn = document.getElementById('drawerVerifyBtn');
        const fileInput = document.getElementById('drawerFileInput');
        const resultDiv = document.getElementById('drawerVerifyResult');
        if(verifyBtn) {
            verifyBtn.onclick = async () => {
                const file = fileInput.files[0];
                if(!file) { resultDiv.innerText = '请选择安装包文件'; resultDiv.style.color='red'; return; }
                resultDiv.innerText = '计算中...';
                try {
                    const buffer = await file.arrayBuffer();
                    const hashBuffer = await crypto.subtle.digest('MD5', buffer);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    const fullMd5 = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
                    const shortMd5 = fullMd5.substring(0,8);
                    if(shortMd5.toLowerCase() === pkg.md5.toLowerCase()) {
                        resultDiv.innerHTML = '✅ 校验通过！文件完整。';
                        resultDiv.style.color = '#10b981';
                    } else {
                        resultDiv.innerHTML = `❌ MD5不匹配！ 期望: ${pkg.md5} ，实际: ${shortMd5}`;
                        resultDiv.style.color = '#dc2626';
                    }
                } catch(e) { resultDiv.innerText = '校验失败: '+e.message; }
            };
        }
    }

    function attachDownloadEvents() {
        document.querySelectorAll('.btn-download').forEach(btn => {
            btn.removeEventListener('click', downloadHandler);
            btn.addEventListener('click', downloadHandler);
        });
    }
    function downloadHandler(e) {
        const dataAttr = this.getAttribute('data-download');
        if(dataAttr) {
            const pkg = JSON.parse(dataAttr);
            openDrawer(pkg);
        }
    }

    function attachFaqEvents() {
        document.querySelectorAll('.faq-question').forEach(q => {
            q.removeEventListener('click', faqToggle);
            q.addEventListener('click', faqToggle);
        });
    }
    function faqToggle(e) {
        const parent = this.closest('.faq-item');
        const answer = parent.querySelector('.faq-answer');
        if(answer) answer.classList.toggle('show');
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }

    // 关闭抽屉
    function closeDrawer() {
        document.getElementById('downloadDrawer').classList.remove('open');
        document.getElementById('drawerBackdrop').classList.remove('show');
    }
    document.querySelector('.close-drawer')?.addEventListener('click', closeDrawer);
    document.getElementById('drawerBackdrop')?.addEventListener('click', closeDrawer);

    // 启动加载远程配置 (优先外部 data.json)
    loadRemoteConfig();
</script>
</body>
</html>
