<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>哔乐神助播 · 礼物自动上屏 · AI弹幕助手 · 智能直播工具</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23ff4785'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white'%3E🎙️%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #fef9f5 0%, #ffe8f0 100%);
            color: #1a1a2e;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #ffd9e6;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff6b9d;
            border-radius: 10px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 抖音风导航 */
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid #ffd9e6;
            z-index: 40;
            padding: 14px 0;
        }
        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.7rem;
            background: linear-gradient(135deg, #ff4785, #ff9f4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo-icon {
            font-size: 2rem;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            font-weight: 600;
        }
        .nav-links a {
            text-decoration: none;
            color: #2d2d44;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #ff4785;
        }

        /* 按钮抖音风 */
        .btn-primary {
            background: linear-gradient(135deg, #ff4785, #ff9f4a);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(255,71,133,0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,71,133,0.4);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #ff9f4a;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #ff4785;
        }
        .btn-outline:hover {
            background: #ff4785;
            color: white;
            border-color: #ff4785;
        }

        /* Hero 亮点小卡片 */
        .hero-highlights {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .highlight-card {
            background: white;
            border-radius: 60px;
            padding: 12px 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px); }
        }

        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            padding: 32px 32px;
            margin-bottom: 48px;
            border: 1px solid #ffe0eb;
        }
        .section-title {
            font-size: 1.9rem;
            font-weight: 800;
            margin-bottom: 28px;
            display: inline-block;
            background: linear-gradient(135deg, #ff4785, #ff9f4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* 功能卡片网格 */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 16px;
        }
        .feature-item {
            background: #fff9fb;
            border-radius: 28px;
            padding: 24px;
            transition: all 0.25s;
            border: 1px solid #ffe0eb;
            cursor: pointer;
        }
        .feature-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255,71,133,0.1);
            border-color: #ff9f4a;
        }
        .feature-icon {
            font-size: 2.6rem;
            margin-bottom: 16px;
        }
        .feature-item h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: #1a1a2e;
        }

        /* 折叠详情区域 */
        .detail-card {
            margin-top: 40px;
            border-top: 2px dashed #ffd9e6;
            padding-top: 30px;
        }
        .detail-item {
            background: #fefaf7;
            border-radius: 24px;
            margin-bottom: 16px;
            border: 1px solid #ffe0eb;
            overflow: hidden;
        }
        .detail-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            background: white;
            transition: background 0.2s;
        }
        .detail-header:hover {
            background: #fff0f5;
        }
        .detail-header .arrow {
            font-size: 1.4rem;
            transition: transform 0.3s;
        }
        .detail-content {
            padding: 0 24px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s;
            background: #ffffffd9;
            line-height: 1.6;
            color: #2d2d44;
        }
        .detail-content.show {
            padding: 20px 24px;
            max-height: 800px;
        }

        /* 推广卡片抖音风 */
        .promotion-card {
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
            border-radius: 40px;
            padding: 40px 32px;
            text-align: center;
            margin-bottom: 48px;
            box-shadow: 0 20px 35px rgba(238,156,167,0.3);
        }
        .promotion-card h2 {
            font-size: 2rem;
            margin-bottom: 12px;
        }
        .promotion-rules {
            font-size: 1.2rem;
            margin: 20px 0;
            font-weight: 600;
        }

        /* 媒体展示区 */
        .media-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            margin-top: 24px;
        }
        .media-image {
            width: 280px;
            height: 200px;
            background: linear-gradient(145deg, #ffe0eb, #fff0f5);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: #ff9f4a;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .media-image:hover {
            transform: scale(1.02);
        }
        .video-placeholder {
            max-width: 100%;
            background: #2d2d44;
            border-radius: 28px;
            padding: 60px;
            text-align: center;
            color: white;
            margin-top: 20px;
        }

        .steps {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .step {
            flex: 1;
            background: #fff9fb;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
        }
        .step-num {
            width: 44px;
            height: 44px;
            background: #ff4785;
            color: white;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .download-item {
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid #ffe0eb;
            padding: 20px 28px;
            margin-bottom: 20px;
        }
        .btn-download {
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-download:hover {
            background: #ff4785;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: #ff9f4a;
        }

        @media (max-width: 720px) {
            .hero h1 { font-size: 2rem; }
            .section-title { font-size: 1.5rem; }
        }
    </style>

<body>

<nav class="navbar">
    <div class="container nav-inner">
        <div class="logo"><span class="logo-icon">🎙️</span><span>哔乐助播</span></div>
        <div class="nav-links"><a href="#hero">简介</a><a href="#features">功能</a><a href="#howto">说明</a><a href="#downloads">下载</a></div>
    </div>
</nav>

<main class="container">
    <div id="heroSection"></div>
    <div id="promotionSection"></div>
    <div id="featuresSection"></div>
    <div id="mediaShowcase"></div>
    <div id="howtoSection"></div>
    <div id="downloadsSection"></div>
    <footer id="footer"></footer>
</main>

<div id="downloadDrawer" class="drawer" style="position:fixed;top:0;right:-100%;width:100%;max-width:480px;height:100%;background:white;z-index:1000;transition:right 0.3s;padding:28px;overflow-y:auto;"></div>
<div id="drawerBackdrop" style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;display:none;"></div>

<script>
    let appData = null;
    async function loadData() {
        const res = await fetch('data.json?_t='+Date.now());
        appData = await res.json();
        renderAll();
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function renderAll() {
        document.getElementById('heroSection').innerHTML = `
            <div class="hero" style="text-align:center;padding:50px 0 20px"><h1 style="font-size:3rem;">${escapeHtml(appData.hero.title)} <span style="background:linear-gradient(135deg,#ff4785,#ff9f4a);background-clip:text;-webkit-background-clip:text;color:transparent;">${escapeHtml(appData.hero.highlight)}</span></h1>
            <div class="sub" style="font-size:1.2rem;color:#4a4a6a;">${escapeHtml(appData.hero.description)}</div>
            <div class="hero-buttons" style="margin-top:30px;"><a href="#downloads" class="btn-primary">⬇️ ${escapeHtml(appData.hero.primaryBtn)}</a><a href="#features" class="btn-outline">✨ ${escapeHtml(appData.hero.secondaryBtn)}</a></div>
            <div class="hero-highlights"><div class="highlight-card">🎁 礼物自动上屏</div><div class="highlight-card">🤖 AI弹幕·Token免费</div><div class="highlight-card">📹 智能录屏</div></div></div>`;
        
        document.getElementById('promotionSection').innerHTML = `<div class="promotion-card"><h2>${escapeHtml(appData.promotion.title)}</h2><div class="promotion-rules">${escapeHtml(appData.promotion.ruleLine1)}<br>${escapeHtml(appData.promotion.ruleLine2)}</div><button class="btn-primary" id="copyPromoBtn">📋 ${escapeHtml(appData.promotion.buttonText)}</button></div>`;
        document.getElementById('copyPromoBtn')?.addEventListener('click',()=>{navigator.clipboard.writeText(appData.promotion.link); alert('推广链接已复制');});
        
        let featuresHtml = `<div class="section-title">${escapeHtml(appData.features.title)}</div><div class="features-grid">`;
        appData.features.list.forEach(f=>{ featuresHtml+=`<div class="feature-item"><div class="feature-icon">${f.icon}</div><h3>${escapeHtml(f.title)}</h3><p>${escapeHtml(f.desc)}</p></div>`; });
        featuresHtml+=`</div><div class="detail-card"><div style="font-weight:800;margin-bottom:16px;">📖 点击展开 · 详细对比手册</div>`;
        appData.features.details.forEach((d,idx)=>{ featuresHtml+=`<div class="detail-item" data-idx="${idx}"><div class="detail-header"><span>${escapeHtml(d.title)}</span><span class="arrow">▼</span></div><div class="detail-content">${d.longDesc}</div></div>`; });
        featuresHtml+=`</div>`;
        document.getElementById('featuresSection').innerHTML = `<div class="card">${featuresHtml}</div>`;
        document.querySelectorAll('.detail-header').forEach(h=>{ h.addEventListener('click',()=>{ h.nextElementSibling.classList.toggle('show'); h.querySelector('.arrow').style.transform = h.nextElementSibling.classList.contains('show')?'rotate(180deg)':'rotate(0deg)'; }); });
        
        let mediaHtml = `<div class="card"><div class="section-title">${escapeHtml(appData.mediaShowcase.title)}</div><div style="text-align:center;">${escapeHtml(appData.mediaShowcase.subtitle)}</div><div class="media-grid">`;
        appData.mediaShowcase.images.forEach(img=>{ mediaHtml+=`<div class="media-image" style="background-image:url('${img}');background-size:cover;background-position:center;color:white;text-shadow:0 0 5px black;">效果示意</div>`; });
        mediaHtml+=`</div><div class="video-placeholder">🎬 宣传视频即将上线 · 敬请期待</div></div>`;
        document.getElementById('mediaShowcase').innerHTML = mediaHtml;
        
        let stepsHtml = `<div class="section-title">${escapeHtml(appData.usage.title)}</div><div class="steps">`;
        appData.usage.steps.forEach(s=>{ stepsHtml+=`<div class="step"><div class="step-num">${s.num}</div><h3>${escapeHtml(s.title)}</h3><p>${escapeHtml(s.desc)}</p></div>`; });
        stepsHtml+=`</div><div class="faq-area"><div class="section-title" style="margin-top:30px">❓ 常见问题</div>`;
        appData.usage.faq.forEach(f=>{ stepsHtml+=`<div class="faq-item" style="margin:12px 0;border-top:1px solid #ffe0eb;padding:12px;"><div class="faq-question" style="font-weight:700;cursor:pointer;">${escapeHtml(f.q)} <span>▼</span></div><div class="faq-answer" style="display:none;margin-top:8px;">${escapeHtml(f.a)}</div></div>`; });
        stepsHtml+=`</div>`;
        document.getElementById('howtoSection').innerHTML = `<div class="card">${stepsHtml}</div>`;
        document.querySelectorAll('.faq-question').forEach(q=>{ q.addEventListener('click',()=>{ q.nextElementSibling.style.display = q.nextElementSibling.style.display==='none'?'block':'none'; }); });
        
        let downloadsHtml = `<div class="section-title">📥 下载安装包</div>`;
        appData.downloads.packages.forEach(p=>{ downloadsHtml+=`<div class="download-item"><div><strong>v${escapeHtml(p.version)}</strong> ${p.isLatest?'✅最新' : ''} | ${escapeHtml(p.fileSize)} | MD5:${escapeHtml(p.md5)}</div><div>${escapeHtml(p.fileName)}</div><div>📅 ${escapeHtml(p.releaseDate)} | ${escapeHtml(p.changelog)}</div><button class="btn-download" data-pkg='${JSON.stringify(p)}'>⬇️ 下载</button></div>`; });
        document.getElementById('downloadsSection').innerHTML = `<div class="card">${downloadsHtml}</div>`;
        document.querySelectorAll('.btn-download').forEach(btn=>{ btn.addEventListener('click',()=>{ let pkg=JSON.parse(btn.getAttribute('data-pkg')); openDrawer(pkg); }); });
        
        document.getElementById('footer').innerHTML = `<p>${escapeHtml(appData.footer.copyright)} | ${escapeHtml(appData.footer.icp)}</p><p style="font-size:0.75rem;">✨ 礼物上屏 · AI弹幕 · 自动录屏 · 效果看得见</p>`;
    }
    function openDrawer(pkg) {
        let drawer = document.getElementById('downloadDrawer');
        let backdrop = document.getElementById('drawerBackdrop');
        drawer.innerHTML = `<div style="display:flex;justify-content:space-between;"><h3>下载 ${pkg.version}</h3><span style="cursor:pointer;font-size:28px;" id="closeDrawerBtn">&times;</span></div><p>文件: ${pkg.fileName}</p><p>大小: ${pkg.fileSize}</p><p>MD5: ${pkg.md5}</p><a href="${pkg.downloadUrl}" class="btn-primary" style="display:inline-block;margin:20px 0;">🔽 立即下载</a><div><input type="file" id="verifyFile"/><button id="verifyBtn" class="btn-outline">校验MD5</button><div id="verifyResult"></div></div>`;
        drawer.style.right = '0';
        backdrop.style.display = 'block';
        document.getElementById('closeDrawerBtn').onclick = ()=>{ drawer.style.right = '-100%'; backdrop.style.display = 'none'; };
        backdrop.onclick = ()=>{ drawer.style.right = '-100%'; backdrop.style.display = 'none'; };
        document.getElementById('verifyBtn').onclick = async ()=>{
            let file = document.getElementById('verifyFile').files[0];
            if(!file){ alert('请选择文件'); return; }
            let reader = new FileReader();
            reader.onload = e=>{ let hash = window.md5(e.target.result); let short = hash.substring(0,8); if(short.toLowerCase()===pkg.md5.toLowerCase()) document.getElementById('verifyResult').innerHTML='✅校验通过'; else document.getElementById('verifyResult').innerHTML=`❌不匹配 期望${pkg.md5} 实际${short}`; };
            reader.readAsBinaryString(file);
        };
    }
    loadData();
</script>
</body>
</html>
